services:
  mysql:
    image: mysql:8.0
    container_name: lab1-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: shopdb
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d

  app:
    build: .
    container_name: lab1-app
    ports:
      - "3000:3000"
    depends_on:
      - mysql

volumes:
  mysql_data:
